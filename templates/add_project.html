{# templates/add_project.html #}
{% extends "base.html" %}

{% block content %}
<div class="bg-gray-50 py-12">
    <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="bg-white rounded-xl shadow-lg overflow-hidden">
            <div class="bg-gradient-to-r from-purple-600 to-indigo-600 px-8 py-6">
                <h1 class="text-2xl font-bold text-white">Add New Project</h1>
                <p class="text-purple-100 mt-1">Share your latest creation with the community</p>
            </div>

            <form method="POST" class="p-8 space-y-6">
                <div>
                    <label class="block text-gray-700 font-semibold mb-2">Project Title *</label>
                    <input type="text" name="title" required
                        class="form-input w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500">
                </div>

                <div>
                    <label class="block text-gray-700 font-semibold mb-2">Short Description *</label>
                    <input type="text" name="short_desc" required
                        class="form-input w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500">
                </div>

                <div>
                    <label class="block text-gray-700 font-semibold mb-2">Long Description *</label>
                    <textarea name="long_desc" rows="4" required
                        class="form-input w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500"></textarea>
                </div>

                <div>
                    <label class="block text-gray-700 font-semibold mb-2">Image URL *</label>
                    <input type="url" name="image_url" required
                        class="form-input w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500"
                        placeholder="https://example.com/image.jpg">
                </div>

                <div>
                    <label class="block text-gray-700 font-semibold mb-2">GitHub Link</label>
                    <input type="url" name="github_link"
                        class="form-input w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500">
                </div>

                <div>
                    <label class="block text-gray-700 font-semibold mb-2">Live Demo Link</label>
                    <input type="url" name="live_demo"
                        class="form-input w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500">
                </div>

                <div>
                    <label class="block text-gray-700 font-semibold mb-2">Category</label>
                    <input type="text" name="category"
                        class="form-input w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500"
                        placeholder="e.g., Web Development, AI, Education">
                </div>

                <div>
                    <label class="block text-gray-700 font-semibold mb-2">Technologies (comma separated)</label>
                    <input type="text" name="technologies"
                        class="form-input w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500"
                        placeholder="React, Python, MongoDB, etc.">
                </div>

                <div class="flex justify-end space-x-4 pt-4">
                    <a href="{{ url_for('main.projects') }}"
                        class="px-6 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50 transition">
                        Cancel
                    </a>
                    <button type="submit" class="btn-primary px-6 py-2 rounded-lg text-white font-semibold">
                        Add Project
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
